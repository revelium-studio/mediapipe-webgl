<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaPipe WebGL — Hand Gesture Distortion</title>
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body>

  <div id="camera-overlay" class="camera-overlay">
    <div class="camera-overlay__content">
      <div class="camera-overlay__icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <h2>Enable Camera</h2>
      <p>Move your right hand to create a pixelation trail.<br>
      Raise your left hand to add chromatic aberration.<br>
      Flip your palm to toggle the menu.</p>
      <button id="enable-camera-btn" class="camera-overlay__btn">Enable Camera</button>
    </div>
  </div>

  <button id="hamburger" class="hamburger" aria-label="Menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav id="panel" class="panel">
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <div id="hand-cursor" class="hand-cursor"></div>

  <canvas id="webgl-canvas"></canvas>

  <video id="webcam" autoplay playsinline style="display:none"></video>

  <canvas id="debug-canvas" class="debug-canvas"></canvas>

  <script src="app.js"></script>
</body>
</html>
