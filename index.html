<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediaPipe WebGL — Hand Gesture Distortion</title>
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body>

  <div id="camera-overlay" class="camera-overlay">
    <div class="camera-overlay__content">
      <div class="camera-overlay__icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <h2>Enable Camera</h2>
      <p>Right hand &rarr; bulge distortion.<br>
      Left hand up/down &rarr; chromatic aberration.<br>
      Pinch with both hands &amp; spread &rarr; scatter elements.<br>
      Flip your palm &rarr; toggle menu.</p>
      <button id="enable-camera-btn" class="camera-overlay__btn">Enable Camera</button>
    </div>
  </div>

  <!-- Bulge controls (top-left) -->
  <div id="controls" class="controls">
    <div class="controls__row">
      <label for="ctrl-radius">Radius</label>
      <input type="range" id="ctrl-radius" min="0.05" max="0.6" step="0.01" value="0.22" />
      <span id="val-radius" class="controls__val">0.22</span>
    </div>
    <div class="controls__row">
      <label for="ctrl-strength">Strength</label>
      <input type="range" id="ctrl-strength" min="-1.0" max="2.0" step="0.05" value="0.6" />
      <span id="val-strength" class="controls__val">0.60</span>
    </div>
    <div class="controls__row">
      <label for="ctrl-falloff">Falloff</label>
      <input type="range" id="ctrl-falloff" min="1.0" max="5.0" step="0.1" value="2.0" />
      <span id="val-falloff" class="controls__val">2.0</span>
    </div>
    <div class="controls__divider"></div>
    <div class="controls__row">
      <label for="ctrl-ghost">Ghost</label>
      <input type="checkbox" id="ctrl-ghost" checked />
      <span class="controls__val" style="opacity:0.4">hands</span>
    </div>
  </div>

  <button id="hamburger" class="hamburger" aria-label="Menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <nav id="panel" class="panel">
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- Heading (centered, vw sizing) -->
  <div id="heading" class="heading">
    <img src="images/assets/heading.svg" alt="Heading" />
  </div>

  <!-- Floating elements (above heading in z-index) -->
  <div class="floating-el" data-el="0"><img src="images/assets/EL-1.png" alt="" /></div>
  <div class="floating-el" data-el="1"><img src="images/assets/EL-2.png" alt="" /></div>
  <div class="floating-el" data-el="2"><img src="images/assets/EL-3.png" alt="" /></div>
  <div class="floating-el" data-el="3"><img src="images/assets/EL-4.png" alt="" /></div>
  <div class="floating-el" data-el="4"><img src="images/assets/EL-5.png" alt="" /></div>

  <div id="hand-cursor" class="hand-cursor"></div>

  <canvas id="webgl-canvas"></canvas>

  <!-- Ghost hands overlay (full-screen, above content) -->
  <canvas id="ghost-canvas" class="ghost-canvas"></canvas>

  <video id="webcam" autoplay playsinline style="display:none"></video>

  <canvas id="debug-canvas" class="debug-canvas"></canvas>

  <script src="app.js"></script>
</body>
</html>
